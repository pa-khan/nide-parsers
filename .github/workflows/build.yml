name: Build Tree-sitter Parsers

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build on ${{ matrix.os }} for ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            arch: x86_64
            target_os: linux
            ext: so
          # macOS Universal (M1/M2 + Intel)
          - os: macos-latest
            arch: universal
            target_os: macos
            ext: dylib
          # Windows x86_64
          - os: windows-latest
            arch: x86_64
            target_os: windows
            ext: dll

    steps:
      - name: Checkout generator repo
        uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y gcc

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build parsers
        shell: bash
        run: |
          WORK_DIR=$(pwd)
          mkdir -p dist
          
          # Список парсеров, которые мы хотим собирать
          LANGUAGES=("rust" "javascript" "typescript" "python" "vue" "c" "cpp" "go")
          
          for lang in "${LANGUAGES[@]}"; do
            echo "Building $lang..."
            cd "$WORK_DIR"
            
            if [ "$lang" == "typescript" ]; then
                git clone --depth 1 https://github.com/tree-sitter/tree-sitter-typescript
                cd tree-sitter-typescript/typescript
            elif [ "$lang" == "vue" ]; then
                git clone --depth 1 https://github.com/ikatyang/tree-sitter-vue
                cd tree-sitter-vue
            else
                git clone --depth 1 https://github.com/tree-sitter/tree-sitter-$lang
                cd tree-sitter-$lang
            fi
            
            # Компиляция
            if [ "${{ runner.os }}" == "Windows" ]; then
              SHARED_FLAG="/LD"
              if [ -f "src/scanner.c" ]; then
                cl $SHARED_FLAG /I src /out:tree-sitter-$lang.${{ matrix.ext }} src/parser.c src/scanner.c
              elif [ -f "src/scanner.cc" ]; then
                cl $SHARED_FLAG /I src /out:tree-sitter-$lang.${{ matrix.ext }} src/parser.c src/scanner.cc
              else
                cl $SHARED_FLAG /I src /out:tree-sitter-$lang.${{ matrix.ext }} src/parser.c
              fi
            else
              if [ "${{ runner.os }}" == "macOS" ]; then
                CFLAGS="-arch x86_64 -arch arm64"
                LDFLAGS="-dynamiclib -Wl,-undefined,dynamic_lookup -arch x86_64 -arch arm64"
              else
                CFLAGS=""
                LDFLAGS="-shared"
              fi
              
              if [ -f "src/scanner.c" ]; then
                cc -fPIC $CFLAGS $LDFLAGS -I src -o tree-sitter-$lang.${{ matrix.ext }} src/parser.c src/scanner.c
              elif [ -f "src/scanner.cc" ]; then
                cc -fPIC $CFLAGS -c -I src src/parser.c -o parser.o
                c++ -fPIC $CFLAGS -c -I src src/scanner.cc -o scanner.o
                c++ -fPIC $LDFLAGS -o tree-sitter-$lang.${{ matrix.ext }} parser.o scanner.o
              else
                cc -fPIC $CFLAGS $LDFLAGS -I src -o tree-sitter-$lang.${{ matrix.ext }} src/parser.c
              fi
            fi
            
            # Переносим артефакт в dist
            if [ "${{ runner.os }}" == "macOS" ]; then
              # Для macOS копируем универсальный бинарник в два файла для x86_64 и aarch64
              cp tree-sitter-$lang.${{ matrix.ext }} "$WORK_DIR/dist/tree-sitter-$lang-${{ matrix.target_os }}-x86_64.${{ matrix.ext }}"
              cp tree-sitter-$lang.${{ matrix.ext }} "$WORK_DIR/dist/tree-sitter-$lang-${{ matrix.target_os }}-aarch64.${{ matrix.ext }}"
            else
              mv tree-sitter-$lang.${{ matrix.ext }} "$WORK_DIR/dist/tree-sitter-$lang-${{ matrix.target_os }}-${{ matrix.arch }}.${{ matrix.ext }}"
            fi
            
            cd "$WORK_DIR"
            if [ "$lang" == "typescript" ]; then
               rm -rf tree-sitter-typescript
            else
               rm -rf tree-sitter-$lang
            fi
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: parsers-${{ matrix.target_os }}-${{ matrix.arch }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-parsers
          merge-multiple: true

      - name: Create or update latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Auto-Built Parsers"
          files: all-parsers/*
          prerelease: false
          make_latest: true
